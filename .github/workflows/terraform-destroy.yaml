name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: 'Type "destroy" to confirm destruction of all infrastructure'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

defaults:
  run:
    working-directory: terraform

jobs:
  destroy:
    name: Destroy
    runs-on: ubuntu-latest
    if: inputs.confirm_destroy == 'destroy'
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::637423429740:role/terraform-github-actions
          aws-region: us-east-1

      - name: terraform init
        run: terraform init

      - name: Capture VPC ID before destroy
        id: vpc
        run: echo "id=$(terraform output -raw vpc_id)" >> "$GITHUB_OUTPUT"

      - name: Delete CloudShell VPC environments in this VPC
        run: |
          set -euo pipefail
          VPC_ID="${{ steps.vpc.outputs.id }}"

          ENV_IDS=$(aws cloudshell describe-environments \
            --query "Environments[?VpcConfig != null && VpcConfig.VpcId=='${VPC_ID}'].EnvironmentId" \
            --output text 2>/dev/null || true)

          if [ -z "$ENV_IDS" ]; then
            echo "No CloudShell VPC environments in ${VPC_ID}"
            exit 0
          fi

          for ENV_ID in $ENV_IDS; do
            echo "Deleting CloudShell environment: $ENV_ID"
            aws cloudshell delete-environment --environment-id "$ENV_ID"
          done

          for i in $(seq 1 24); do
            REMAINING=$(aws ec2 describe-network-interfaces \
              --filters "Name=vpc-id,Values=$VPC_ID" \
                        "Name=description,Values=*CloudShell*" \
              --query 'length(NetworkInterfaces)' \
              --output text)
            if [ "$REMAINING" = "0" ]; then
              echo "CloudShell ENIs released"
              break
            fi
            echo "Waiting for $REMAINING CloudShell ENI(s) to release..."
            sleep 5
          done

      - name: Delete available ENIs (Lambda/EKS orphans)
        run: |
          VPC_ID="${{ steps.vpc.outputs.id }}"
          AVAILABLE_ENIS=$(aws ec2 describe-network-interfaces \
            --filters "Name=vpc-id,Values=$VPC_ID" "Name=status,Values=available" \
            --query 'NetworkInterfaces[*].NetworkInterfaceId' \
            --output text)
          for ENI_ID in $AVAILABLE_ENIS; do
            echo "Deleting orphaned ENI: $ENI_ID"
            aws ec2 delete-network-interface --network-interface-id "$ENI_ID" || \
              echo "Skipping $ENI_ID (likely service-owned)"
          done

      - name: Destroy EKS and dependent resources first
        run: |
          terraform destroy \
            -target=module.monitoring \
            -target=aws_security_group_rule.cloudshell_to_eks \
            -target=module.eks \
            -var-file=prod.tfvars \
            -auto-approve

      - name: Wait for EKS ENIs to be released
        run: |
          VPC_ID="${{ steps.vpc.outputs.id }}"
          echo "Waiting for all ENIs in VPC to clear..."
          for i in $(seq 1 30); do
            COUNT=$(aws ec2 describe-network-interfaces \
              --filters "Name=vpc-id,Values=$VPC_ID" \
              --query 'length(NetworkInterfaces)' \
              --output text)
            echo "Attempt $i/30: $COUNT ENIs remaining"
            [ "$COUNT" -eq 0 ] && echo "All ENIs cleared" && break
            [ "$i" -eq 30 ] && echo "ERROR: Timed out waiting for ENI cleanup" && exit 1
            sleep 20
          done

      - name: Destroy remaining resources
        run: terraform destroy -var-file=prod.tfvars -auto-approve
