name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: 'Type "destroy" to confirm destruction of all infrastructure'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

defaults:
  run:
    working-directory: terraform

jobs:
  destroy:
    name: Destroy
    runs-on: ubuntu-latest
    if: inputs.confirm_destroy == 'destroy'
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::637423429740:role/terraform-github-actions
          aws-region: us-east-1

      - name: terraform init
        run: terraform init

      - name: Capture VPC ID before destroy
        id: vpc
        run: echo "id=$(terraform output -raw vpc_id)" >> "$GITHUB_OUTPUT"

      - name: Fail fast if CloudShell VPC environments exist
        run: |
          ENIS=$(aws ec2 describe-network-interfaces \
            --filters "Name=vpc-id,Values=${{ steps.vpc.outputs.id }}" \
                      "Name=description,Values=*CloudShell*" \
            --query 'NetworkInterfaces[].NetworkInterfaceId' --output text)
          if [ -n "$ENIS" ]; then
            echo "::error::CloudShell ENIs present: $ENIS"
            echo "::error::Delete CloudShell VPC environments via Console first:"
            echo "::error::  CloudShell → Actions → Manage VPC environments → Delete"
            exit 1
          fi

      - name: Destroy EKS first
        run: |
          terraform destroy \
            -target=module.monitoring \
            -target=aws_security_group_rule.cloudshell_to_eks \
            -target=module.eks \
            -var-file=prod.tfvars \
            -auto-approve

      - name: Wait for EKS ENIs to release
        run: |
          for i in $(seq 1 15); do
            COUNT=$(aws ec2 describe-network-interfaces \
              --filters "Name=vpc-id,Values=${{ steps.vpc.outputs.id }}" \
              --query 'NetworkInterfaces[?!contains(Description, `NAT Gateway`)] | length(@)' \
              --output text)
            [ "$COUNT" -eq 0 ] && exit 0
            echo "Attempt $i/15: $COUNT EKS ENIs still attached"
            sleep 20
          done
          echo "::error::EKS ENIs did not release after 5 min"
          exit 1

      - name: Destroy remaining resources
        run: terraform destroy -var-file=prod.tfvars -auto-approve
