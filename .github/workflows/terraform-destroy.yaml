name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: 'Type "destroy" to confirm destruction of all infrastructure'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

defaults:
  run:
    working-directory: terraform

jobs:
  destroy:
    name: Destroy
    runs-on: ubuntu-latest
    if: inputs.confirm_destroy == 'destroy'
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::637423429740:role/terraform-github-actions
          aws-region: us-east-1

      - name: terraform init
        run: terraform init

      - name: terraform destroy
        run: terraform destroy -var-file=prod.tfvars -auto-approve
