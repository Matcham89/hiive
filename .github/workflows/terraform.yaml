name: Terraform

on:
  pull_request:
    branches: [main]
    paths: [terraform/**]
  push:
    branches: [main]
    paths: [terraform/**]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

defaults:
  run:
    working-directory: terraform

jobs:
  validate:
    name: Format & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::637423429740:role/terraform-github-actions
          aws-region: us-east-1

      - name: terraform fmt
        run: terraform fmt -check -recursive

      - name: terraform init
        run: terraform init

      - name: terraform validate
        run: terraform validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: TFLint init
        run: tflint --init

      - name: TFLint
        run: tflint --format compact --recursive

  plan:
    name: Plan
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      exitcode: ${{ steps.plan.outputs.exitcode }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::637423429740:role/terraform-github-actions
          aws-region: us-east-1

      - name: terraform init
        run: terraform init

      - name: terraform plan
        id: plan
        run: terraform plan -var-file=prod.tfvars -out=tfplan -detailed-exitcode -no-color
        continue-on-error: true

      - name: Write plan summary
        run: |
          echo "## Terraform Plan" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.plan.outputs.stdout }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Fail on plan error
        if: steps.plan.outputs.exitcode == '1'
        run: exit 1

      # Store the plan so the apply job can use it without re-planning
      - name: Upload plan
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan
          retention-days: 1

  # Only runs on merge to main — applies the plan generated above
  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: plan
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && needs.plan.outputs.exitcode == '2'
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::637423429740:role/terraform-github-actions
          aws-region: us-east-1

      - name: terraform init
        run: terraform init

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform/

      - name: terraform apply
        run: terraform apply -auto-approve tfplan
